<div class="h-screen bg-slate-100 p-2 ">
  <!-- GRID PRINCIPAL -->
  <div class="grid h-full gap-4 grid-cols-[70px_1fr]">
    <!-- LEFT SIDEBAR -->
    <aside class="rounded-3xl bg-white border border-slate-200 shadow-sm flex flex-col items-center py-4 gap-4">
      <!-- ICONO -->
      <a routerLink="" data-tooltip-target="tooltip-home" data-tooltip-placement="right"
        class="w-12 h-12 rounded-2xl hover:bg-slate-100 flex items-center justify-center transition">
        <div id="tooltip-home" role="tooltip"
          class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white bg-dark rounded-base shadow-xs opacity-0 tooltip">
          Inicio
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-house-icon lucide-house">
          <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
          <path
            d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
      </a>
      <a routerLink="/clientes" data-tooltip-target="tooltip-clients" data-tooltip-placement="right"
        class="w-12 h-12 rounded-2xl hover:bg-slate-100 flex items-center justify-center transition">
        <div id="tooltip-clients" role="tooltip"
          class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white bg-dark rounded-base shadow-xs opacity-0 tooltip">
          Clientes
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-users-icon lucide-users">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <path d="M16 3.128a4 4 0 0 1 0 7.744" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <circle cx="9" cy="7" r="4" />
        </svg>
      </a>
    </aside>

    <!-- CONTENIDO -->
    <main class="grid h-full gap-4 lg:grid-cols-4">

      <!-- PANEL PRINCIPAL -->
      <section class="h-full rounded-3xl bg-white shadow-sm border border-slate-200 overflow-hidden"
        [class.lg:col-span-3]="router.url === '/'" [class.lg:col-span-4]="router.url !== '/'">
        <router-outlet></router-outlet>
      </section>

      @if (router.url === '/') {
      <!-- SIDEBAR DERECHO -->
      <aside class="h-full grid gap-4 lg:grid-rows-[7fr_3fr]">

        <div class="rounded-3xl bg-white shadow-sm border border-slate-200">
          <app-userprofile />
        </div>

        <div class="rounded-3xl bg-white shadow-sm border border-slate-200">
          <app-options />
        </div>
      </aside>
      }
    </main>
  </div>
</div>
